<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quizly — Make & Share Quizzes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <header class="home-header">
      <div class="logo">Quizly</div>
      <p class="tagline">Create quizzes. Share the link. Watch friends fail.</p>
    </header>
    <div class="home-actions">
      <button class="btn-primary" onclick="showScreen('screen-create')">
        <span class="btn-icon">+</span> Create a Quiz
      </button>
      <div class="divider-text">or paste a quiz link to take one</div>
      <div class="link-input-row">
        <input type="text" id="take-link-input" placeholder="Paste quiz link here…" />
        <button class="btn-secondary" onclick="loadFromLink()">Go</button>
      </div>
    </div>
    <div class="home-decoration">
      <div class="deco-pill">Multiple choice</div>
      <div class="deco-pill">Shareable link</div>
      <div class="deco-pill">Instant results</div>
      <div class="deco-pill">Free forever</div>
    </div>
  </div>

  <!-- CREATE SCREEN -->
  <div id="screen-create" class="screen">
    <div class="create-header">
      <button class="back-btn" onclick="showScreen('screen-home')">← Back</button>
      <h1>Build your quiz</h1>
    </div>

    <div class="create-body">
      <div class="field-group">
        <label>Quiz title</label>
        <input type="text" id="quiz-title" placeholder="e.g. How well do you know me?" maxlength="80"/>
      </div>

      <div id="questions-list"></div>

      <button class="btn-add-question" onclick="addQuestion()">+ Add question</button>

      <div class="create-footer">
        <button class="btn-primary wide" onclick="generateQuiz()">Generate shareable link →</button>
      </div>
    </div>
  </div>

  <!-- SHARE SCREEN -->
  <div id="screen-share" class="screen">
    <div class="share-inner">
      <div class="share-icon">🎉</div>
      <h2>Your quiz is ready!</h2>
      <p class="share-sub">Share this link with anyone. They don't need an account.</p>
      <div class="share-link-box">
        <span id="share-url"></span>
        <button class="copy-btn" onclick="copyLink()">Copy</button>
      </div>
      <div id="copy-toast" class="copy-toast">Copied!</div>
      <div class="share-actions">
        <button class="btn-primary" onclick="previewQuiz()">Preview quiz</button>
        <button class="btn-ghost" onclick="showScreen('screen-create')">Edit quiz</button>
        <button class="btn-ghost" onclick="resetAll()">Make another</button>
      </div>
    </div>
  </div>

  <!-- TAKE QUIZ SCREEN -->
  <div id="screen-take" class="screen">
    <div class="take-header">
      <div class="logo small">Quizly</div>
      <h2 id="take-title"></h2>
      <div class="progress-bar-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label"></span>
      </div>
    </div>

    <div class="take-body">
      <div class="question-card" id="question-card">
        <div class="q-number" id="q-number"></div>
        <div class="q-text" id="q-text"></div>
        <div class="options-grid" id="options-grid"></div>
      </div>
      <button class="btn-primary wide" id="next-btn" onclick="nextQuestion()" style="display:none">Next →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="screen-results" class="screen">
    <div class="results-inner">
      <div class="score-circle">
        <span class="score-num" id="score-num"></span>
        <span class="score-denom" id="score-denom"></span>
      </div>
      <h2 id="results-title"></h2>
      <p class="results-msg" id="results-msg"></p>
      <div id="results-breakdown"></div>
      <div class="results-actions">
        <button class="btn-primary" onclick="retakeQuiz()">Try again</button>
        <button class="btn-ghost" onclick="showScreen('screen-home')">Make your own quiz</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
